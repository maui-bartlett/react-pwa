<!DOCTYPE html>
<html lang="en">

<head>
  <title>React PWA</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- https://web.dev/uses-rel-preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <meta name="description" content="Starter kit for modern web applications">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="mask-icon" href="/favicon.svg" color="#FFFFFF">
  <!-- Initial fallback; route-specific PWA chrome is updated at runtime
       by DynamicManifest. -->
  <meta name="theme-color" content="#173755">

  <meta name="keywords" content="react, pwa, boilerplate, template" />

  <meta name="description" content="Starter kit for modern web applications" data-react-helmet="true" />
  <meta property="og:title" content="React-PWA" data-react-helmet="true">
  <meta property="og:description" content="Starter kit for modern web applications" data-react-helmet="true">
  <meta property="og:url" content="https://react-pwa.surenatoyan.com/" data-react-helmet="true">
  <meta property="og:image" content="https://react-pwa.surenatoyan.com/cover.png" data-react-helmet="true" />
  <meta name="twitter:card" content="summary" data-react-helmet="true" />

  <!-- https://web.dev/defer-non-critical-css/ -->
  <link rel="preload" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <!-- Avatar Legends page uses IM Fell English (and small-caps variant) for the parchment aesthetic -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <!-- Stats numbers use Caveat — a handwritten font whose "1" is clearly distinct from "I" -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <!-- Avatar Legends balance labels use Bebas Neue for condensed sans-serif lettering -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
